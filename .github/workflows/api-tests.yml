name: API Automation Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest -n auto --html=reports/report.html --self-contained-html --alluredir=reports/allure-results

      - name: Upload Pytest HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-html-report
          path: reports/report.html

      - name: Generate Allure Report
        if: always()
        run: |
          if [ ! -d reports/allure-results ]; then
            echo "No allure-results found — skipping Allure report"
            exit 0
          fi
          sudo apt-get update -qq && sudo apt-get install -y -qq default-jre-headless
          curl -sL "https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz" -o /tmp/allure.tgz
          tar xzf /tmp/allure.tgz -C /tmp
          sudo mv /tmp/allure-2.27.0 /opt/allure
          sudo ln -sf /opt/allure/bin/allure /usr/local/bin/allure
          allure generate reports/allure-results -o reports/allure-report --clean

      - name: Upload Dashboard Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-report
          path: reports/dashboard.html

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: reports/allure-results

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report
